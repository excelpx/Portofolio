<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,sans-serif;}
        body{min-height:100vh;display:grid;place-items:center;background:#07101d;color:#f8fafc;}
        .login-card{width:min(420px,calc(100%-2rem));background:#0f172a;border:1px solid rgba(148,163,184,.12);border-radius:28px;padding:2rem;box-shadow:0 30px 70px rgba(15,23,42,.5);}
        .login-card h1{font-size:1.85rem;margin-bottom:1rem;}
        .login-card p{color:#94a3b8;margin-bottom:2rem;}
        .form-group{display:grid;gap:.5rem;margin-bottom:1rem;}
        label{font-size:.95rem;color:#cbd5e1;}
        input{width:100%;padding:1rem;border-radius:16px;border:1px solid rgba(148,163,184,.16);background:#111827;color:#f8fafc;}
        .btn{width:100%;padding:1rem;border:none;border-radius:16px;background:#38bdf8;color:#0f172a;font-weight:700;cursor:pointer;transition:transform .2s ease;}
        .btn:hover{transform:translateY(-2px);}
    </style>
</head>
<body>
    <section class="login-card">
        <h1>Admin Login</h1>
        <p>Masuk untuk mengelola data portofolio.</p>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required />
            </div>
            <button class="btn" type="submit">Masuk</button>
        </form>
    </section>
</body>
</html>
